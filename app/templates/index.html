{% extends "base.html" %}

{% block content %}
<div class="profile">
    <div class="profile-picture">
        {% if profile_img %}
        <img src="{{ url_for('static', filename=profile_img) }}" alt="{{ title }}">
        {% else %}
        <div class="profile-initials">{{ title.split()[0][0] }}{{ title.split()[-1][0] }}</div>
        {% endif %}
    </div>
    <h1>{{ title }}</h1>
</div>

<section class="section">
    <h2>About</h2>
    <p>{{ about }}</p>
</section>
{% endblock %}
