{% extends "base.html" %}

{% block content %}
<section class="section">
    <h2>Hobbies</h2>
    {% for hobby in hobbies %}
    <div class="hobby">
        <h3>{{ hobby.name }}</h3>
        {% if hobby.image %}
        <img src="{{ url_for('static', filename=hobby.image) }}" alt="{{ hobby.name }}">
        {% endif %}
    </div>
    {% endfor %}
</section>
{% endblock %}
